services:
  # 1. BANCO DE DADOS (Persistência)
  mongodb:
    image: mongo:6.0
    container_name: lab-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    networks:
      - lab-network

  # 2. IDENTIDADE E SEGURANÇA (IAM)
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    container_name: lab-keycloak
    command: start-dev
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    networks:
      - lab-network

  # 3. ORQUESTRADOR DO KAFKA (Zookeeper)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: lab-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - lab-network

  # 4. MENSAGERIA (Apache Kafka Clássico)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: lab-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Configura duas "portas": Uma para o Spring Boot acessar de fora (localhost:9092) e outra para comunicação interna dos containers (kafka:29092)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - lab-network

  # 5. INTERFACE VISUAL DO KAFKA
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: lab-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: cluster-local
      # O UI roda no docker, então ele usa a rede interna para achar o Kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092 
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka
      - zookeeper
    networks:
      - lab-network

  # 6. OBSERVABILIDADE (Rastreamento Distribuído)
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: lab-zipkin
    ports:
      - "9411:9411"
    networks:
      - lab-network

networks:
  lab-network:  
    driver: bridge