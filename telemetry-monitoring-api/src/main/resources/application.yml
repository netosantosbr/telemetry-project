server:
  port: 8082 # Porta diferente do Producer para não dar conflito

spring:
  application:
    name: telemetry-monitoring-api

  kafka:
    consumer:
      bootstrap-servers: localhost:9092
      group-id: telemetry-monitoring-group
      auto-offset-reset: earliest # Lê desde o começo se for a primeira vez que sobe
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        # Pulo do gato: O Spring bloqueia classes desconhecidas por segurança.
        # O asterisco diz: "Confie no JSON que tá chegando, pode converter".
        spring.json.trusted.packages: "*"

# Configurações de Observabilidade (Idênticas ao Producer)
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0 # 100% das requisições vão pro Zipkin (ideal para dev)
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans